name: Blip
options:
  bundleIdPrefix: com.ivankuria
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  BlipKit:
    path: Packages/BlipKit

targets:
  Blip:
    type: application
    platform: macOS
    sources:
      - path: Blip
    dependencies:
      - package: BlipKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivankuria.blip
        PRODUCT_NAME: Blip
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Ivan Kuria"
        CODE_SIGN_ENTITLEMENTS: Blip/Resources/Blip.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        # Dev: ad-hoc "sign to run locally"; Developer ID notarization at M3.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
